  <circle cx="256" cy="256" r="230" fill="#556B2F" stroke="white" stroke-width="8" />
  
  <!-- Bold "TN" Monogram in White (Maximum Visibility) -->
  <g stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <!-- THE 'T' -->
